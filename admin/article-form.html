<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Article — Admin — AlgoWire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="admin-layout">
        <header class="admin-header">
            <div class="admin-header__title">
                <a href="../index.html" class="navbar__logo">
                    <span class="navbar__logo-icon">&gt;_</span>
                    <span class="navbar__logo-text">Algo<span class="navbar__logo-dot">.</span>Wire</span>
                </a>
                <span style="color:var(--text-muted);margin-left:8px;">/ Admin</span>
            </div>
            <nav class="admin-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="articles.html" class="active">Articles</a>
                <a href="categories.html">Categories</a>
                <a href="authors.html">Authors</a>
                <a href="../index.html" target="_blank">View Site</a>
                <a href="login.html" style="color:var(--accent);" id="logoutBtn">Logout</a>
            </nav>
        </header>

        <div class="admin-content" style="max-width:800px;">
            <div class="section-header">
                <h2 class="section-title">New Article</h2>
                <a href="articles.html" class="btn btn--outlined btn--sm">← Back</a>
            </div>

            <div class="alert alert--error" id="formError" style="display:none;">Please fill in all required fields.</div>

            <form id="articleForm" style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-xl);">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" name="title" id="title" required placeholder="Article title...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category_id">Category *</label>
                        <select name="category_id" id="category_id" required style="width:100%;padding:12px 16px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-family:var(--font-primary);font-size:14px;">
                            <option value="">Select category</option>
                            <option value="1">Artificial Intelligence</option>
                            <option value="2">DevOps</option>
                            <option value="3">Quantum Computing</option>
                            <option value="4">Web3 & Decentralization</option>
                            <option value="5">Machine Learning</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="author_id">Author *</label>
                        <select name="author_id" id="author_id" required style="width:100%;padding:12px 16px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-family:var(--font-primary);font-size:14px;">
                            <option value="">Select author</option>
                            <option value="1">Mohamed Dghar</option>
                            <option value="2">Aymane Salmoune</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="excerpt">Excerpt</label>
                    <textarea name="excerpt" id="excerpt" rows="3" placeholder="Brief summary of the article..."></textarea>
                </div>

                <div class="form-group">
                    <label for="content">Content (HTML) *</label>
                    <textarea name="content" id="content" rows="15" required placeholder="<p>Write your article content here...</p>" style="font-family:var(--font-mono);font-size:13px;"></textarea>
                </div>

                <div class="form-group">
                    <label for="cover_image">Cover Image URL</label>
                    <input type="url" name="cover_image" id="cover_image" placeholder="https://images.unsplash.com/...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="read_time">Read Time (minutes)</label>
                        <input type="number" name="read_time" id="read_time" value="5" min="1" max="60">
                    </div>
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select name="status" id="status" style="width:100%;padding:12px 16px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-family:var(--font-primary);font-size:14px;">
                            <option value="published">Published</option>
                            <option value="draft">Draft</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="display:flex;align-items:center;gap:var(--space-sm);">
                    <input type="checkbox" name="is_featured" id="is_featured" style="width:auto;">
                    <label for="is_featured" style="margin:0;">Mark as Featured</label>
                </div>

                <div style="display:flex;gap:var(--space-md);margin-top:var(--space-lg);">
                    <button type="submit" class="btn btn--primary">Create Article</button>
                    <a href="articles.html" class="btn btn--outlined">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
    <script>
        document.getElementById('articleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('title').value.trim();
            const cat = document.getElementById('category_id').value;
            const author = document.getElementById('author_id').value;
            const content = document.getElementById('content').value.trim();

            if (!title || !cat || !author || !content) {
                document.getElementById('formError').style.display = 'flex';
                window.scrollTo(0, 0);
                return;
            }
            alert('✓ Article created successfully! (Static mockup)');
            window.location.href = 'articles.html';
        });
    </script>
</body>
</html>
