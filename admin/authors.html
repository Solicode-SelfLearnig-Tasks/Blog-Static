<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authors — Admin — AlgoWire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="admin-layout">
        <header class="admin-header">
            <div class="admin-header__title">
                <a href="../index.html" class="navbar__logo">
                    <span class="navbar__logo-icon">&gt;_</span>
                    <span class="navbar__logo-text">Algo<span class="navbar__logo-dot">.</span>Wire</span>
                </a>
                <span style="color:var(--text-muted);margin-left:8px;">/ Admin</span>
            </div>
            <nav class="admin-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="articles.html">Articles</a>
                <a href="categories.html">Categories</a>
                <a href="authors.html">Authors</a>
                <a href="../index.html" target="_blank">View Site</a>
                <a href="login.html" style="color:var(--accent);" id="logoutBtn">Logout</a>
            </nav>
        </header>

        <div class="admin-content">
            <div class="section-header">
                <h2 class="section-title">Authors</h2>
                <a href="author-form.html" class="btn btn--primary btn--sm">+ New Author</a>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Avatar</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Articles</th>
                        <th>Date Added</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <img src="https://api.dicebear.com/7.x/initials/svg?seed=MD&backgroundColor=e63946" alt="Avatar" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                        </td>
                        <td><strong style="color:var(--text-primary);">Mohamed Dghar</strong></td>
                        <td><a href="mailto:dghar@algowire.com" style="color:var(--text-muted);">dghar@algowire.com</a></td>
                        <td><span class="tag tag--filled">14</span></td>
                        <td>3 months ago</td>
                        <td>
                            <div class="admin-table__actions">
                                <a href="author-form.html" class="btn btn--outlined btn--sm">Edit</a>
                                <a href="#" class="btn btn--sm btn--delete" style="color:var(--accent);">Delete</a>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <img src="https://api.dicebear.com/7.x/initials/svg?seed=AS&backgroundColor=3498db" alt="Avatar" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                        </td>
                        <td><strong style="color:var(--text-primary);">Aymane Salmoune</strong></td>
                        <td><a href="mailto:salmoune@algowire.com" style="color:var(--text-muted);">salmoune@algowire.com</a></td>
                        <td><span class="tag tag--filled">10</span></td>
                        <td>3 months ago</td>
                        <td>
                            <div class="admin-table__actions">
                                <a href="author-form.html" class="btn btn--outlined btn--sm">Edit</a>
                                <a href="#" class="btn btn--sm" style="color:var(--accent);" onclick="return confirm('Delete this author?')">Delete</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
