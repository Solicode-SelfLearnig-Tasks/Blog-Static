<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — AlgoWire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-card__logo">
                <a href="../index.html" class="navbar__logo" style="justify-content:center;">
                    <span class="navbar__logo-icon" style="font-size:28px;">&gt;_</span>
                    <span class="navbar__logo-text" style="font-size:24px;">Algo<span class="navbar__logo-dot">.</span>Wire</span>
                </a>
                <p class="login-card__title">Admin Panel</p>
            </div>

            <div class="alert alert--error" id="loginError" style="display:none;">Invalid username or password.</div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn--primary btn--block">Sign In</button>
            </form>

            <p style="text-align:center;margin-top:var(--space-lg);font-size:13px;color:var(--text-muted);">
                <a href="../index.html" style="color:var(--accent);">← Back to blog</a>
            </p>
        </div>
    </div>

    <script src="admin.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            // Static mockup: accept admin/admin
            if (user === 'admin' && pass === 'admin') {
                localStorage.setItem('algowire-admin', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('loginError').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
